<script>
const CURRICULUM = [
  { id:"internet", icon:"🌐", title:"Internet & Browser Basics", sub:"Bilkul shuru se", level:"Beginner", lc:"#2A5740",
    topics:[
      {id:"i1",text:"Internet kya hai? Kaise kaam karta hai"},
      {id:"i2",text:"Browser kya hai? Chrome, Firefox, Edge — farq samajhna"},
      {id:"i3",text:"Tabs, bookmarks, history — efficiently use karna"},
      {id:"i4",text:"Google search smart tips (quotes, filters, operators)"},
      {id:"i5",text:"URL kya hai? Safe sites kaise pehchane"},
      {id:"i6",text:"Incognito mode kya hota hai aur kab use karein"},
      {id:"i7",text:"Internet speed test karna"},
    ]},
  { id:"email", icon:"📧", title:"Email & Communication", sub:"Digital baat-cheet seekhna", level:"Beginner", lc:"#2A5740",
    topics:[
      {id:"e1",text:"Gmail account banana"},
      {id:"e2",text:"Email bhejna aur receive karna"},
      {id:"e3",text:"CC aur BCC ka farq samajhna"},
      {id:"e4",text:"Attachments safely bhejna"},
      {id:"e5",text:"Email organize karna — labels, folders, stars"},
      {id:"e6",text:"Spam se kaise bacha jaye"},
      {id:"e7",text:"Zoom / Google Meet setup karna"},
    ]},
  { id:"files", icon:"📁", title:"Files, Folders & Storage", sub:"Digital cheezein manage karna", level:"Beginner", lc:"#2A5740",
    topics:[
      {id:"f1",text:"Files aur folders kya hain"},
      {id:"f2",text:"File types samajhna (.pdf, .jpg, .docx, .mp4)"},
      {id:"f3",text:"Files rename, move, copy, delete karna"},
      {id:"f4",text:"Google Drive use karna — free cloud storage"},
      {id:"f5",text:"Cloud vs local storage — farq kya hai"},
      {id:"f6",text:"Zip files banana aur kholna"},
      {id:"f7",text:"Phone se PC mein files transfer karna"},
    ]},
  { id:"safety", icon:"🔒", title:"Online Safety", sub:"Internet par mehfooz rehna", level:"Beginner", lc:"#2A5740",
    topics:[
      {id:"s1",text:"Strong password banana — sahi tarika"},
      {id:"s2",text:"Password manager use karna (free tools)"},
      {id:"s3",text:"2-Factor Authentication (2FA) setup karna"},
      {id:"s4",text:"Phishing emails aur fake links pehchanna"},
      {id:"s5",text:"Social media privacy settings set karna"},
      {id:"s6",text:"Safe online shopping — kya dekhna chahiye"},
      {id:"s7",text:"Online scams se kaise bacha jaye"},
    ]},
  { id:"mobile", icon:"📱", title:"Mobile Skills", sub:"Phone ko smartly use karna", level:"Beginner", lc:"#2A5740",
    topics:[
      {id:"m1",text:"Phone storage organize karna"},
      {id:"m2",text:"Useful apps — productivity aur Islamic tools"},
      {id:"m3",text:"Mobile photography tips"},
      {id:"m4",text:"Screen record karna — Android + iPhone"},
      {id:"m5",text:"QR codes banana aur scan karna"},
      {id:"m6",text:"Apps aur contacts backup karna"},
    ]},
  { id:"design", icon:"🎨", title:"Design & Content Creation", sub:"Visual content banana", level:"Intermediate", lc:"#C9A455",
    topics:[
      {id:"d1",text:"Website banana — GitHub Pages se bilkul free",done:true,badge:"Session 1 Complete ✅"},
      {id:"d2",text:"Canva vs PowerPoint — comparison aur kab kya use karein",done:true,badge:"Session 2 Complete ✅"},
      {id:"d3",text:"Canva advanced tips aur tricks"},
      {id:"d4",text:"Photo editing basics — Canva / Lightroom Mobile"},
      {id:"d5",text:"Video editing — CapCut beginner tutorial"},
      {id:"d6",text:"YouTube thumbnail banana Canva mein"},
      {id:"d7",text:"Reels aur Shorts banana phone se"},
    ]},
  { id:"productivity", icon:"💼", title:"Productivity & Work Tools", sub:"Kaam asaan banana", level:"Intermediate", lc:"#C9A455",
    topics:[
      {id:"p1",text:"Google Docs — basics seekhna"},
      {id:"p2",text:"Google Sheets — data organize karna"},
      {id:"p3",text:"Google Forms — survey aur quiz banana"},
      {id:"p4",text:"Google Calendar — schedule manage karna"},
      {id:"p5",text:"PDF tools — merge, compress, convert (free)"},
      {id:"p6",text:"Notion basics — notes aur planning"},
      {id:"p7",text:"Task management tools — Trello / ClickUp"},
    ]},
  { id:"presence", icon:"🌍", title:"Online Presence & Social Media", sub:"Apni pehchaan banana online", level:"Intermediate", lc:"#C9A455",
    topics:[
      {id:"pr1",text:"Professional bio aur profile banana"},
      {id:"pr2",text:"Linktree setup — sab links ek jagah"},
      {id:"pr3",text:"Instagram for dawah / education"},
      {id:"pr4",text:"YouTube channel banana — step by step"},
      {id:"pr5",text:"Facebook Page vs Group — farq aur use"},
      {id:"pr6",text:"Hashtags aur basic SEO samajhna"},
      {id:"pr7",text:"Content calendar banana — organized rehna"},
    ]},
  { id:"ai", icon:"🤖", title:"AI Tools", sub:"Artificial Intelligence ki duniya", level:"Intermediate", lc:"#C9A455",
    topics:[
      {id:"a1",text:"AI kya hai? Beginners ke liye simple explanation"},
      {id:"a2",text:"ChatGPT basics — kaise use karein"},
      {id:"a3",text:"Claude basics — kaise use karein"},
      {id:"a4",text:"AI se Urdu/Hindi/English writing help lena"},
      {id:"a5",text:"AI se images banana — free tools"},
      {id:"a6",text:"Prompt writing — AI se sahi kaam kaise lein"},
      {id:"a7",text:"AI tools for teachers aur content creators"},
    ]},
  { id:"earning", icon:"💰", title:"Earning Online", sub:"Digital skills se halal income", level:"Advanced", lc:"#C27D8F",
    topics:[
      {id:"ea1",text:"Freelancing kya hai? Kaise shuru karein"},
      {id:"ea2",text:"Fiverr profile banana — step by step"},
      {id:"ea3",text:"Kon si skills online bech sakte hain"},
      {id:"ea4",text:"Digital products banana — ebooks, templates, courses"},
      {id:"ea5",text:"Online teaching setup karna"},
      {id:"ea6",text:"Payment methods — PayPal, Payoneer"},
    ]},
];

let state = {};
let expanded = { internet: true, design: true };

async function loadState() {
  try {
    const r = await window.storage.get('safar-v3');
    if (r) state = JSON.parse(r.value);
    else {
      CURRICULUM.forEach(c => c.topics.forEach(t => { if (t.done) state[t.id] = true; }));
    }
  } catch {
    CURRICULUM.forEach(c => c.topics.forEach(t => { if (t.done) state[t.id] = true; }));
  }
  render();
}

async function saveState() {
  try { await window.storage.set('safar-v3', JSON.stringify(state)); } catch {}
}

function getStats() {
  let total = 0, done = 0;
  CURRICULUM.forEach(c => c.topics.forEach(t => { total++; if (state[t.id]) done++; }));
  return { total, done };
}

function render() {
  const { total, done } = getStats();
  const pct = Math.round((done / total) * 100);
  document.getElementById('prog-text').textContent = done + '/' + total + ' topics • ' + pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';

  const catsEl = document.getElementById('cats');
  catsEl.innerHTML = '';

  CURRICULUM.forEach(cat => {
    const catDone = cat.topics.filter(t => state[t.id]).length;
    const catTotal = cat.topics.length;
    const catPct = Math.round((catDone / catTotal) * 100);
    const isOpen = !!expanded[cat.id];

    const card = document.createElement('div');
    card.className = 'cat-card';

    const hdr = document.createElement('div');
    hdr.className = 'cat-header';
    hdr.innerHTML = `
      <span class="cat-icon">${cat.icon}</span>
      <div class="cat-info">
        <div class="cat-title">${cat.title}</div>
        <div class="cat-sub">${cat.sub}</div>
      </div>
      <div class="cat-meta">
        <span class="level-badge" style="background:${cat.lc}">${cat.level.toUpperCase()}</span>
        <span class="cat-count">${catDone}/${catTotal}</span>
        <span class="cat-arrow">${isOpen ? '▲' : '▼'}</span>
      </div>`;
    hdr.onclick = () => { expanded[cat.id] = !expanded[cat.id]; render(); };
    card.appendChild(hdr);

    if (!isOpen && catPct > 0) {
      const mp = document.createElement('div');
      mp.className = 'mini-prog';
      mp.innerHTML = `<div class="mini-track"><div class="mini-fill" style="width:${catPct}%"></div></div>`;
      card.appendChild(mp);
    }

    if (isOpen) {
      const topicsEl = document.createElement('div');
      topicsEl.className = 'topics';
      cat.topics.forEach(t => {
        const isDone = !!state[t.id];
        const row = document.createElement('div');
        row.className = 'topic-row' + (isDone ? ' done' : '');
        row.innerHTML = `
          <div class="checkbox${isDone ? ' checked' : ''}"><span class="check-icon">✓</span></div>
          <div>
            <div class="topic-text${isDone ? ' done' : ''}">${t.text}</div>
            ${t.badge ? `<span class="session-badge">${t.badge}</span>` : ''}
          </div>`;
        row.onclick = () => {
          state[t.id] = !state[t.id];
          saveState();
          render();
        };
        topicsEl.appendChild(row);
      });
      card.appendChild(topicsEl);
    }

    catsEl.appendChild(card);
  });
}

loadState();
</script>
