let state={};
let expanded={devices:true};

async function load(){
  try{
    const r=await window.storage.get('safar-v4');
    if(r) state=JSON.parse(r.value);
    else{
      CURRICULUM.forEach(p=>p.cats.forEach(c=>c.topics.forEach(t=>{if(t.done) state[t.id]=true;})));
    }
  }catch{
    CURRICULUM.forEach(p=>p.cats.forEach(c=>c.topics.forEach(t=>{if(t.done) state[t.id]=true;})));
  }
  render();
}

async function save(){
  try{await window.storage.set('safar-v4',JSON.stringify(state));}catch{}
}

function stats(){
  let total=0,done=0;
  CURRICULUM.forEach(p=>p.cats.forEach(c=>c.topics.forEach(t=>{
    if(c.isBonus) return;
    total++;if(state[t.id])done++;
  })));
  return{total,done};
}

function render(){
  const{total,done}=stats();
  const pct=Math.round((done/total)*100);
  document.getElementById('prog-text').textContent=done+'/'+total+' topics  •  '+pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';

  const el=document.getElementById('cats');
  el.innerHTML='';

  CURRICULUM.forEach(phase=>{
    const pl=document.createElement('div');
    pl.className='phase-label';
    pl.textContent=phase.phase;
    el.appendChild(pl);

    phase.cats.forEach(cat=>{
      const catDone=cat.topics.filter(t=>state[t.id]).length;
      const catTotal=cat.topics.length;
      const catPct=Math.round((catDone/catTotal)*100);
      const isOpen=!!expanded[cat.id];

      const card=document.createElement('div');
      card.className=cat.isBonus?'bonus-card cat-card':'cat-card';

      // Header
      const hdr=document.createElement('div');
      hdr.className='cat-hdr';
      const lvlText=cat.isBonus?'HAR SESSION':''+cat.level.toUpperCase();
      hdr.innerHTML=`<span class="cat-icon">${cat.icon}</span>
        <div class="cat-info">
          <div class="cat-title">${cat.title}</div>
          <div class="cat-sub">${cat.sub}</div>
        </div>
        <div class="cat-meta">
          <span class="lvl-badge" style="background:${cat.lc}">${lvlText}</span>
          <span class="cat-count">${catDone}/${catTotal}</span>
          <span class="cat-arrow">${isOpen?'▲':'▼'}</span>
        </div>`;
      hdr.onclick=()=>{expanded[cat.id]=!expanded[cat.id];render();};
      card.appendChild(hdr);

      if(cat.isBonus&&isOpen){
        const note=document.createElement('div');
        note.className='bonus-note';
        note.innerHTML='<span>⏱️</span><span>Yeh fixed agenda hai — in mein se koi bhi 2-3 choose karo har session ke liye</span>';
        card.appendChild(note);
      }

      if(!isOpen&&catPct>0&&!cat.isBonus){
        const mp=document.createElement('div');
        mp.className='mini-prog';
        mp.innerHTML=`<div class="mini-track"><div class="mini-fill" style="width:${catPct}%"></div></div>`;
        card.appendChild(mp);
      }

      if(isOpen){
        const tw=document.createElement('div');
        tw.className='topics-wrap';
        cat.topics.forEach((t,idx)=>{
          const isDone=!!state[t.id];
          const row=document.createElement('div');
          row.className='topic-row'+(isDone?' done-row':'');
          row.innerHTML=`<div class="chk${isDone?' on':''}"><span class="chk-tick">✓</span></div>
            <div>
              <div class="t-text${isDone?' done-text':''}">${t.text}</div>
              ${t.badge?`<span class="sess-badge">${t.badge}</span>`:''}
            </div>`;
          row.onclick=()=>{state[t.id]=!state[t.id];save();render();};
          tw.appendChild(row);
        });
        card.appendChild(tw);
      }

      el.appendChild(card);
    });
  });
}

load();
</script>
